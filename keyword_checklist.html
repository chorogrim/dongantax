<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 키워드 체크리스트</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f7f6f3;
    --border: #e9e9e7;
    --hover: #f1f1ef;
    --text: #37352f;
    --text2: #9b9a97;
    --text3: #c7c6c3;
    --blue: #2383e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px; background: var(--bg); color: var(--text);
    padding: 40px 36px 60px; max-width: 960px;
  }
  .page-icon { font-size: 36px; margin-bottom: 8px; }
  .page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .page-desc { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

  .gp { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .gp-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .gp-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .gp-bar { height: 100%; background: var(--blue); border-radius: 99px; transition: width 0.3s; }
  .gp-num { font-size: 13px; color: var(--text2); white-space: nowrap; }

  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab {
    padding: 8px 16px; font-size: 13px; color: var(--text2);
    border: none; background: none; cursor: pointer; font-family: inherit;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    border-radius: 4px 4px 0 0;
  }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }
  .tab .badge {
    display: inline-block; margin-left: 6px; padding: 1px 6px;
    background: var(--surface); border-radius: 99px; font-size: 11px; color: var(--text2);
  }
  .tab.active .badge { background: #e8f2fd; color: var(--blue); }

  .toolbar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .notion-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); cursor: pointer; font-size: 12px;
    color: var(--text2); font-family: inherit;
  }
  .notion-btn:hover { background: var(--hover); color: var(--text); }
  .notion-btn svg { width: 13px; height: 13px; }
  .spacer { flex: 1; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }
  .card {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; background: var(--bg); transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .card-prog { font-size: 11px; color: var(--text2); white-space: nowrap; margin-top: 2px; }
  .card-bar-wrap { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
  .card-bar { height: 100%; background: var(--blue); border-radius: 99px; transition: width 0.3s; }
  .card-bar.full { background: #0f7b6c; }

  /* Sub-section labels */
  .sub-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text2); margin: 8px 0 5px;
  }
  .sub-label:first-child { margin-top: 0; }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 4px; font-size: 11px;
    cursor: pointer; border: 1px solid transparent;
    transition: opacity 0.1s, transform 0.1s; user-select: none;
  }
  .tag:active { transform: scale(0.96); }
  .tag .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .tag.g0 { background: #e8f2fd; color: #1a5fa8; border-color: #b8d4f4; }
  .tag.g0 .dot { background: #5ba3e8; }
  .tag.g0.done { background: #2383e2; color: #fff; border-color: #2383e2; }
  .tag.g0.done .dot { background: rgba(255,255,255,0.7); }

  .tag.g1 { background: #f0eefe; color: #5b45b0; border-color: #d0c8f4; }
  .tag.g1 .dot { background: #9b87e0; }
  .tag.g1.done { background: #7c6fcd; color: #fff; border-color: #7c6fcd; }
  .tag.g1.done .dot { background: rgba(255,255,255,0.7); }

  .tag.g2 { background: #e8f5f2; color: #0f6b5a; border-color: #b0dcd4; }
  .tag.g2 .dot { background: #3fb89a; }
  .tag.g2.done { background: #0f7b6c; color: #fff; border-color: #0f7b6c; }
  .tag.g2.done .dot { background: rgba(255,255,255,0.7); }

  .tag.g3 { background: #fef3e8; color: #a05a1a; border-color: #f4d4a8; }
  .tag.g3 .dot { background: #e8962a; }
  .tag.g3.done { background: #d97706; color: #fff; border-color: #d97706; }
  .tag.g3.done .dot { background: rgba(255,255,255,0.7); }

  .tag.g4 { background: #edf7e8; color: #2d6a1a; border-color: #b8dda8; }
  .tag.g4 .dot { background: #5caa3a; }
  .tag.g4.done { background: #3d8b28; color: #fff; border-color: #3d8b28; }
  .tag.g4.done .dot { background: rgba(255,255,255,0.7); }

  .tag.g5 { background: #fefae8; color: #8a6d1a; border-color: #f0e0a0; }
  .tag.g5 .dot { background: #d4a830; }
  .tag.g5.done { background: #b7880a; color: #fff; border-color: #b7880a; }
  .tag.g5.done .dot { background: rgba(255,255,255,0.7); }

  .tag.g6 { background: #feeaea; color: #9b2828; border-color: #f4b8b8; }
  .tag.g6 .dot { background: #e05a5a; }
  .tag.g6.done { background: #c53030; color: #fff; border-color: #c53030; }
  .tag.g6.done .dot { background: rgba(255,255,255,0.7); }

  .legend-section { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
  .legend-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 10px; }
  .legend-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-tag { padding: 2px 10px; border-radius: 4px; font-size: 12px; opacity: 0.85; border: 1px solid transparent; }
</style>
</head>
<body>

<div class="page-icon">📋</div>
<div class="page-title">PDF 키워드 체크리스트</div>
<p class="page-desc">태그를 클릭해 확인 완료 표시 · 색상은 키워드 유형을 나타냅니다</p>

<div class="gp">
  <span class="gp-label">전체 진행률</span>
  <div class="gp-wrap"><div class="gp-bar" id="gpBar" style="width:0%"></div></div>
  <span class="gp-num" id="gpNum">0 / 0</span>
</div>

<div class="toolbar">
  <button class="notion-btn" onclick="resetAll()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 1 1 2 4.5"/><path d="M2 4v4h4"/></svg>
    초기화
  </button>
  <button class="notion-btn" onclick="checkAllVisible()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8l4 4 8-6"/></svg>
    탭 전체 확인
  </button>
  <div class="spacer"></div>
  <button class="notion-btn" onclick="exportCSV()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10v3h10v-3M8 2v8M5 7l3 3 3-3"/></svg>
    CSV
  </button>
</div>

<div class="tabs" id="tabs"></div>
<div class="cards" id="cards"></div>

<div class="legend-section">
  <div class="legend-title">키워드 색상 범례</div>
  <div class="legend-items" id="legend"></div>
</div>

<script>
const KW_GROUPS = [
  { name: "회사 정보", g: 0, kws: ["상호(성명)","상호(법인명)","상호","법인명","본점상호","성명(대표자명)","성명/법인명","신고인(납세자)","납세자"] },
  { name: "등록번호",  g: 1, kws: ["사업자등록번호","사업자(주민)등록번호","사업자등록번호(주민등록번호)","사업자번호","본점사업자번호","주민/법인등록번호"] },
  { name: "사업장",    g: 2, kws: ["사업장명","사업장(주소)"] },
  { name: "신고 구분", g: 3, kws: ["신고서종류","신고구분","신고년기","과세유형","정기신고","반기","제출구분"] },
  { name: "세목/과세", g: 4, kws: ["세목명","세목","과세대상","(지급)명세서 종류"] },
  { name: "날짜/기간", g: 5, kws: ["신고기간","납부연월","연도/기분","귀속연월","지급연월","지급연도","지급월","제출연월","과세연월","귀속사업기간","귀속사업연도"] },
  { name: "납부기한",  g: 6, kws: ["납부기한","납부기한일자","납부기한(분납)"] },
];
const KW_G = {};
KW_GROUPS.forEach(grp => grp.kws.forEach(kw => KW_G[kw] = grp.g));

// 제출내역/상세내역 구분이 있는 문서
const DOC_GROUPS = [
  { cat: "부가가치세", emoji: "🧾", docs: [
    { name: "부가가치세 신고서/접수증", sections: [
        { label: "제출내역", kws: ["상호(성명)","사업자(주민)등록번호","신고서종류","신고구분"] },
        { label: "상세내역", kws: ["신고년기","과세유형","신고기간"] },
    ]},
    { name: "부가가치세 납부서", sections: [
        { label: null, kws: ["납부연월","상호(성명)","사업자등록번호(주민등록번호)","연도/기분","세목명","납부기한"] },
    ]},
    { name: "일반과세자 부가가치세(예정)", sections: [
        { label: null, kws: ["신고기간","상호(법인명)","성명(대표자명)","사업자등록번호"] },
    ]},
  ]},
  { cat: "원천세", emoji: "💼", docs: [
    { name: "원천세 신고서/접수증", sections: [
        { label: "제출내역", kws: ["상호(성명)","사업자(주민)등록번호","신고서종류","신고구분"] },
        { label: "상세내역", kws: ["반기","귀속연월","지급연월","제출연월"] },
    ]},
    { name: "근로소득세 납부서", sections: [
        { label: null, kws: ["납부연월","상호(성명)","사업자등록번호(주민등록번호)","연도/기분","세목명","납부기한"] },
    ]},
    { name: "사업소득세 납부서", sections: [
        { label: null, kws: ["납부연월","상호(성명)","사업자등록번호(주민등록번호)","연도/기분","세목명","납부기한"] },
    ]},
    { name: "법인이자소득세 납부서", sections: [
        { label: null, kws: ["납부연월","상호(성명)","사업장(주소)","사업자등록번호(주민등록번호)","연도/기분","세목명","납부기한"] },
    ]},
    { name: "이자소득세 납부서", sections: [
        { label: null, kws: ["납부연월","상호(성명)","사업장(주소)","사업자등록번호(주민등록번호)","연도/기분","세목명","납부기한"] },
    ]},
    { name: "배당소득세 납부서", sections: [
        { label: null, kws: ["납부연월","상호(성명)","사업장(주소)","사업자등록번호(주민등록번호)","연도/기분","세목명","납부기한"] },
    ]},
    { name: "사업소득간이지급명세서 접수증", sections: [
        { label: null, kws: ["(지급)명세서 종류","제출구분","상호(법인명)","지급연도","지급월"] },
    ]},
  ]},
  { cat: "지방소득세", emoji: "🏛", docs: [
    { name: "지방소득세 신고서", sections: [
        { label: null, kws: ["신고인(납세자)","사업장명","사업자등록번호","법인명","주민/법인등록번호","성명/법인명"] },
    ]},
    { name: "지방소득세 접수증", sections: [
        { label: null, kws: ["신고인(납세자)","사업장명","사업자등록번호","성명/법인명"] },
    ]},
    { name: "지방소득세 납부서", sections: [
        { label: null, kws: ["납세자","세목","과세대상","납부기한일자"] },
    ]},
    { name: "법인지방소득세 신고서/접수증", sections: [
        { label: null, kws: ["법인명","본점사업자번호","본점상호","사업자번호","상호","귀속사업기간","정기신고","납부기한(분납)"] },
    ]},
    { name: "법인지방소득세 납부서/영수증", sections: [
        { label: null, kws: ["납세자","세목","납부기한","법인명","사업장명","귀속사업연도"] },
    ]},
  ]},
  { cat: "법인세", emoji: "🏢", docs: [
    { name: "법인세 신고서 접수증", sections: [
        { label: "제출내역", kws: ["법인명","사업자등록번호","신고서종류","신고구분"] },
        { label: "상세내역", kws: ["과세연월"] },
    ]},
  ]},
];

// flatten all kws per doc
function docKws(doc) { return doc.sections.flatMap(s => s.kws); }
const ALL_DOCS = DOC_GROUPS.flatMap(g => g.docs);

let currentTab = 0;

function sk(doc, kw) { return `cl__${doc}__${kw}`; }
function isChk(doc, kw) { return localStorage.getItem(sk(doc,kw)) === '1'; }
function setChk(doc, kw, v) { v ? localStorage.setItem(sk(doc,kw),'1') : localStorage.removeItem(sk(doc,kw)); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function buildTabs() {
  document.getElementById('tabs').innerHTML = DOC_GROUPS.map((grp, i) => {
    const total = grp.docs.reduce((s,d) => s + docKws(d).length, 0);
    const done  = grp.docs.reduce((s,d) => s + docKws(d).filter(kw => isChk(d.name,kw)).length, 0);
    return `<button class="tab${i===currentTab?' active':''}" onclick="switchTab(${i})">
      ${grp.emoji} ${grp.cat}<span class="badge">${done}/${total}</span>
    </button>`;
  }).join('');
}

function buildCards() {
  const grp = DOC_GROUPS[currentTab];
  document.getElementById('cards').innerHTML = grp.docs.map(doc => {
    const allKws = docKws(doc);
    const done  = allKws.filter(kw => isChk(doc.name,kw)).length;
    const total = allKws.length;
    const pct   = total ? Math.round(done/total*100) : 0;

    let sectionsHtml = '';
    doc.sections.forEach(sec => {
      if (sec.label) sectionsHtml += `<div class="sub-label">${esc(sec.label)}</div>`;
      sectionsHtml += `<div class="tags">` + sec.kws.map(kw => {
        const g = KW_G[kw] !== undefined ? KW_G[kw] : 0;
        const chk = isChk(doc.name, kw);
        return `<span class="tag g${g}${chk?' done':''}" onclick="toggleTag(this,'${esc(doc.name)}','${esc(kw)}')">
          <span class="dot"></span>${esc(kw)}
        </span>`;
      }).join('') + `</div>`;
    });

    return `<div class="card" id="card-${esc(doc.name)}">
      <div class="card-header">
        <div class="card-title">${esc(doc.name)}</div>
        <div class="card-prog">${done}/${total}</div>
      </div>
      <div class="card-bar-wrap">
        <div class="card-bar${pct===100?' full':''}" style="width:${pct}%"></div>
      </div>
      ${sectionsHtml}
    </div>`;
  }).join('');
}

function buildLegend() {
  const colors = ['#2383e2','#7c6fcd','#0f7b6c','#d97706','#3d8b28','#b7880a','#c53030'];
  document.getElementById('legend').innerHTML = KW_GROUPS.map((grp,i) =>
    `<span class="legend-tag tag g${grp.g}">${grp.name}</span>`
  ).join('');
}

function toggleTag(el, doc, kw) {
  const now = el.classList.contains('done');
  el.classList.toggle('done', !now);
  setChk(doc, kw, !now);
  updateCardBar(doc);
  updateGlobal();
  buildTabs();
}

function updateCardBar(docName) {
  const doc = DOC_GROUPS[currentTab].docs.find(d => d.name === docName);
  if (!doc) return;
  const allKws = docKws(doc);
  const done = allKws.filter(kw => isChk(docName,kw)).length;
  const total = allKws.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const card = document.getElementById('card-' + esc(docName));
  if (!card) return;
  card.querySelector('.card-prog').textContent = `${done}/${total}`;
  const bar = card.querySelector('.card-bar');
  bar.style.width = pct + '%';
  bar.classList.toggle('full', pct === 100);
}

function updateGlobal() {
  const total = ALL_DOCS.reduce((s,d) => s + docKws(d).length, 0);
  const done  = ALL_DOCS.reduce((s,d) => s + docKws(d).filter(kw => isChk(d.name,kw)).length, 0);
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('gpBar').style.width = pct + '%';
  document.getElementById('gpNum').textContent = `${done} / ${total}`;
}

function switchTab(i) { currentTab = i; buildTabs(); buildCards(); }

function resetAll() {
  if (!confirm('모든 체크를 초기화하시겠습니까?')) return;
  ALL_DOCS.forEach(d => docKws(d).forEach(kw => setChk(d.name,kw,false)));
  buildTabs(); buildCards(); updateGlobal();
}

function checkAllVisible() {
  const grp = DOC_GROUPS[currentTab];
  grp.docs.forEach(doc => docKws(doc).forEach(kw => setChk(doc.name,kw,true)));
  buildTabs(); buildCards(); updateGlobal();
}

function exportCSV() {
  const allKws = [...new Set(ALL_DOCS.flatMap(d => docKws(d)))];
  let csv = '문서유형,' + allKws.map(k=>`"${k}"`).join(',') + '\n';
  ALL_DOCS.forEach(doc => {
    const kws = docKws(doc);
    const row = [`"${doc.name}"`];
    allKws.forEach(kw => {
      if (!kws.includes(kw)) row.push('');
      else row.push(isChk(doc.name,kw)?'✓':'●');
    });
    csv += row.join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = 'keyword_checklist.csv'; a.click();
}

buildTabs(); buildCards(); buildLegend(); updateGlobal();
</script>
</body>
</html>
